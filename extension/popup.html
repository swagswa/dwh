<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { width: 340px; padding: 20px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f8fafc; color: #1e293b; }
    h2 { font-size: 18px; margin-bottom: 16px; }
    .form-group { margin-bottom: 12px; }
    label { display: block; font-size: 13px; color: #64748b; margin-bottom: 4px; }
    input { width: 100%; padding: 10px 12px; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 14px; outline: none; }
    input:focus { border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59,130,246,0.1); }
    button { width: 100%; padding: 10px; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.15s; }
    .btn-primary { background: #3b82f6; color: white; }
    .btn-primary:hover { background: #2563eb; }
    .btn-primary:disabled { background: #93c5fd; cursor: not-allowed; }
    .btn-secondary { background: #e2e8f0; color: #475569; margin-top: 12px; }
    .btn-secondary:hover { background: #cbd5e1; }
    .status { margin-top: 12px; padding: 10px; border-radius: 8px; font-size: 13px; line-height: 1.4; }
    .status.info { background: #eff6ff; color: #1e40af; }
    .status.success { background: #f0fdf4; color: #166534; }
    .status.error { background: #fef2f2; color: #991b1b; }
    .hidden { display: none; }
    .divider { border-top: 1px solid #e2e8f0; margin: 16px 0; }

    /* Slider + input row */
    .range-row { display: flex; align-items: center; gap: 10px; }
    .range-row input[type=range] { flex: 1; accent-color: #3b82f6; }
    .limit-input { width: 64px !important; padding: 6px 8px !important; text-align: center; font-weight: 600; font-size: 13px !important; }

    /* Progress section */
    .progress-section { margin-top: 12px; }
    .progress-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 6px; }
    .progress-counter { font-size: 13px; color: #64748b; }
    .progress-counter .current { font-size: 20px; font-weight: 700; color: #1e293b; transition: all 0.3s ease; display: inline-block; }
    .progress-counter .total { font-weight: 600; }
    .progress-counter .current.bump { animation: bump 0.3s ease; }
    .progress-pct { font-size: 13px; font-weight: 600; color: #3b82f6; transition: all 0.3s ease; }
    .progress-track { width: 100%; height: 8px; background: #e2e8f0; border-radius: 4px; overflow: hidden; }
    .progress-fill { height: 100%; background: linear-gradient(90deg, #3b82f6, #6366f1); border-radius: 4px; transition: width 0.4s ease; width: 0%; }
    .progress-title { font-size: 12px; color: #94a3b8; margin-top: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; transition: opacity 0.2s; }

    @keyframes bump {
      0% { transform: scale(1); }
      50% { transform: scale(1.2); color: #3b82f6; }
      100% { transform: scale(1); }
    }
  </style>
</head>
<body>
  <div id="login-section">
    <h2>DWH Login</h2>
    <div class="form-group">
      <label>Email</label>
      <input id="email" type="email" placeholder="your@email.com">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input id="password" type="password" placeholder="Password">
    </div>
    <button id="login-btn" class="btn-primary">Войти</button>
    <div id="login-error" class="status error hidden"></div>
  </div>

  <div id="sync-section" class="hidden">
    <h2>ChatGPT Sync</h2>
    <div class="form-group">
      <label>Количество чатов</label>
      <div class="range-row">
        <input id="chat-limit" type="range" min="10" max="2000" step="10" value="50">
        <input id="chat-limit-input" type="number" min="1" max="99999" value="50" class="limit-input">
      </div>
    </div>
    <button id="sync-btn" class="btn-primary">Синхронизировать (50)</button>
    <div id="sync-status" class="status info hidden"></div>
    <div id="progress-container" class="progress-section hidden">
      <div class="progress-header">
        <span class="progress-counter"><span id="progress-current" class="current">0</span> <span class="total">/ <span id="progress-total">0</span></span></span>
        <span id="progress-pct" class="progress-pct">0%</span>
      </div>
      <div class="progress-track"><div id="progress-fill" class="progress-fill"></div></div>
      <div id="progress-title" class="progress-title"></div>
    </div>
    <div class="divider"></div>
    <button id="logout-btn" class="btn-secondary">Выйти</button>
  </div>

  <script src="supabase.min.js"></script>
  <script src="popup.js"></script>
</body>
</html>
